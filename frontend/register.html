<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="nav"><span class="logo">Feedback <span>System</span></span></div>
  <div class="auth-page">
    <section class="auth-card glass">
      <h2>Register</h2>
      <form id="registerForm">
        <label for="rollNumber">Roll Number</label>
        <input type="text" id="rollNumber" required pattern="160123737[0-9]{3,6}|1601237373[0-9]{2,3}" />
        <label for="password">Password</label>
        <input type="password" id="password" required />
        <label for="section">Section</label>
        <select id="section" required>
          <option value="">Select Section</option>
          <option value="IT-1">IT-1</option>
          <option value="IT-2">IT-2</option>
          <option value="IT-3">IT-3</option>
        </select>
        <div class="form-actions">
          <button type="submit" class="big-btn">Register</button>
          <a href="index.html" class="link-btn">Already registered? Login</a>
        </div>
      </form>
      <div id="status"></div>
    </section>
    <aside class="auth-aside glass">
      <p>Create an account to give feedback for your faculty and labs. Secure and simple process!</p>
    </aside>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
