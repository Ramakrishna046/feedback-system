<!DOCTYPE html>
<html>
<head>
  <title>Select Faculty</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .select-row {text-align:center;margin:50px auto;}
    .select-btn {
      background:linear-gradient(90deg,#a272ff,#f86eed);color:#fff;
      font-weight:700;font-size:1.18rem;
      padding:18px 42px;border-radius:14px;border:none;box-shadow:0 6px 24px #cd8cff70;margin:24px 20px;
      cursor:pointer;transition:transform .18s;
      animation:fadein 0.6s;
    }
    .select-btn:hover {transform:scale(1.06);}
    .faculty-grid {display:grid;grid-template-columns:1fr 1fr;gap:23px;margin-top:30px;}
    .faculty-card { /* ...as before... */ }
    .faculty-img {
      width:72px;height:72px;border-radius:50%;object-fit:cover;
      box-shadow:0 2px 9px #cf8cff44;border:2px solid var(--accent2);
      background: #c0b6e2;
    }
    .faculty-name {margin-top:11px;font-size:1.23rem;font-weight:600;color:var(--accent);}
    .faculty-subject {margin-top:7px;font-size:1.03rem;color:#e7ddff;}
    .cardfadeout {animation: fadeout .6s linear;}
    @keyframes fadeout { to { opacity:0; transform:scale(0.9); }}
    @keyframes fadein { from {opacity:0;} to {opacity:1;}}
  </style>
</head>
<body>
  <div class="nav"><span class="logo">Feedback <span>System</span></span></div>
  <div class="select-row" id="chooseType">
    <button class="select-btn" id="showTheory">Theory</button>
    <button class="select-btn" id="showLabs">Labs</button>
  </div>
  <div id="facultySection" style="display:none;">
    <h2 style="text-align:center;letter-spacing:2px;">Choose Faculty</h2>
    <div class="faculty-grid" id="facultyGrid"></div>
  </div>
  <script src="js/faculty.js"></script>
</body>
</html>
