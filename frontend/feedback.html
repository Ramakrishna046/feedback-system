<!DOCTYPE html>
<html>
<head>
  <title>Submit Feedback</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="nav"><span class="logo">Feedback <span>System</span></span></div>
  <div class="feedback-page">
    <section class="feedback-card glass">
      <h2>Submit Feedback</h2>
      <form id="feedbackForm">
        <label for="rollNumber">Roll Number</label>
        <input type="text" id="rollNumber" disabled />
        <label for="section">Section</label>
        <input type="text" id="section" disabled />
        <label for="faculty">Faculty</label>
        <select id="faculty" required></select>
        <label for="subject">Class Type/Subject</label>
        <select id="subject" required></select>
        <label for="rating">Rating</label>
        <select id="rating" required>
          <option value="">Select</option>
          <option value="1">1 - Poor</option>
          <option value="2">2 - Fair</option>
          <option value="3">3 - Good</option>
          <option value="4">4 - Very Good</option>
          <option value="5">5 - Excellent</option>
        </select>
        <label for="comments">Comments</label>
        <textarea id="comments" maxlength="256"></textarea>
        <div class="form-actions">
          <button type="submit" class="big-btn">Submit Feedback</button>
        </div>
      </form>
      <div id="status"></div>
    </section>
    <aside class="feedback-aside glass">
      <p>Select the faculty and the class type (theory/lab) you want to review. Your honest feedback helps improve teaching and labs!</p>
    </aside>
  </div>
  <script src="js/feedback.js"></script>
</body>
</html>
