<!DOCTYPE html>
<html>
<head>
  <title>Student Feedback Portal - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="nav"><span class="logo">Feedback <span>System</span></span></div>
  <div class="auth-page">
    <section class="auth-card glass">
      <h2>Login</h2>
      <form id="loginForm">
        <label for="rollNumber">Roll Number</label>
        <input type="text" id="rollNumber" pattern="160123737[0-9]{3,6}|1601237373[0-9]{2,3}" required />
        <label for="password">Password</label>
        <input type="password" id="password" required />
        <div class="form-actions">
          <button type="submit" class="big-btn">Login</button>
          <a href="register.html" class="link-btn">Don’t have account? Register</a>
        </div>
      </form>
      <div id="status"></div>
    </section>
    <aside class="auth-aside glass">
      <h3>Welcome!</h3>
      <p>Login using your Roll Number and Section to submit feedback for your faculty and labs. A modern, secure system for quality improvement.</p>
    </aside>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
